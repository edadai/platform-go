syntax = "proto3";

option csharp_namespace = "SubscriptionBillingService.Api.Protos";
option go_package = "github.com/edadai/platform-go/contracts/subscriptionbillingpb;subscriptionbillingpb";

package subscriptionbilling;

service SubscriptionBillingApi {
  rpc CreateProduct (CreateProductRequest) returns (EntityResponse);
  rpc CreatePlan (CreatePlanRequest) returns (EntityResponse);
  rpc CreatePrice (CreatePriceRequest) returns (EntityResponse);
  rpc CreateOffer (CreateOfferRequest) returns (EntityResponse);
  rpc ConfigureOfferPhase (ConfigureOfferPhaseRequest) returns (EntityResponse);
  rpc ConfigureCatalogPresentation (ConfigureCatalogPresentationRequest) returns (EntityResponse);
  rpc EnableOffer (EntityIdRequest) returns (EntityResponse);
  rpc DisableOffer (EntityIdRequest) returns (EntityResponse);
  rpc AttachEntitlementToPlan (AttachEntitlementToPlanRequest) returns (EntityResponse);
  rpc ConfigureTrialPolicy (ConfigureTrialPolicyRequest) returns (EntityResponse);
  rpc ConfigureBillingPolicy (ConfigureBillingPolicyRequest) returns (EntityResponse);
  rpc GetBillingSummary (BillingSummaryRequest) returns (BillingSummaryResponse);
  rpc ListProducts (ListProductsRequest) returns (ListProductsResponse);
  rpc ListPlans (ListPlansRequest) returns (ListPlansResponse);
  rpc ListOffers (ListOffersRequest) returns (ListOffersResponse);
  rpc ListTrialPolicies (ListPoliciesRequest) returns (ListTrialPoliciesResponse);
  rpc ListBillingPolicies (ListPoliciesRequest) returns (ListBillingPoliciesResponse);
  rpc UpdatePlan (UpdatePlanRequest) returns (PlanResponse);
  rpc PublishPlan (EntityIdRequest) returns (PlanResponse);
  rpc ArchivePlan (EntityIdRequest) returns (PlanResponse);

  rpc ListSubscriptions (ListSubscriptionsRequest) returns (ListSubscriptionsResponse);
  rpc StartTrial (StartTrialRequest) returns (SubscriptionResponse);
  rpc StartSubscription (StartSubscriptionRequest) returns (SubscriptionResponse);
  rpc CancelSubscription (EntityIdRequest) returns (SubscriptionResponse);
  rpc ChangePlan (ChangePlanRequest) returns (SubscriptionResponse);
  rpc GetSubscriptionStatus (EntityIdRequest) returns (SubscriptionStatusResponse);
  rpc GetCurrentSubscription (CustomerRequest) returns (SubscriptionResponse);

  rpc CheckEntitlement (CheckEntitlementRequest) returns (CheckEntitlementResponse);
  rpc GetEntitlementSnapshot (EntityIdRequest) returns (EntitlementSnapshotResponse);
  rpc RefreshEntitlementSnapshot (EntityIdRequest) returns (EntitlementSnapshotResponse);
  rpc RecordUsage (RecordUsageRequest) returns (EntityResponse);

  rpc CreateInvoice (CreateInvoiceRequest) returns (InvoiceResponse);
  rpc GetInvoice (EntityIdRequest) returns (InvoiceResponse);
  rpc ListAllInvoices (ListBillingDocumentsRequest) returns (ListInvoicesResponse);
  rpc ListInvoices (CustomerRequest) returns (ListInvoicesResponse);
  rpc MarkManualInvoicePaid (EntityIdRequest) returns (InvoiceResponse);
  rpc ListPayments (ListBillingDocumentsRequest) returns (ListPaymentsResponse);
  rpc RefundPayment (RefundPaymentRequest) returns (EntityResponse);
  rpc ListLedgerAccounts (ListLedgerAccountsRequest) returns (ListLedgerAccountsResponse);
  rpc ListLedgerTransactions (ListLedgerTransactionsRequest) returns (ListLedgerTransactionsResponse);

  rpc CreateCheckout (CreateCheckoutRequest) returns (CheckoutResponse);
  rpc GetPaymentStatusByReference (PaymentReferenceRequest) returns (PaymentResponse);

  rpc ReceivePaystackWebhook (ReceivePaystackWebhookRequest) returns (StatusResponse);
}

message ListPlansRequest { bool public_only = 1; }
message BillingSummaryRequest {}
message BillingSummaryResponse {
  int32 product_count = 1;
  int32 published_plan_count = 2;
  int32 active_subscription_count = 3;
  int32 trialing_subscription_count = 4;
  int32 open_invoice_count = 5;
  double open_invoice_amount = 6;
  int32 succeeded_payment_count = 7;
  double succeeded_payment_amount = 8;
  string currency = 9;
}
message ListProductsRequest { bool active_only = 1; }
message ProductResponse {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  bool is_active = 5;
  string created_at_utc = 6;
  string updated_at_utc = 7;
}
message ListProductsResponse { repeated ProductResponse products = 1; }
message UpdatePlanRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  int32 display_order = 4;
  RequestContext context = 5;
  double amount = 6;
  string currency = 7;
  string interval_unit = 8;
  int32 interval_count = 9;
}
message PlanResponse {
  string id = 1;
  string product_id = 2;
  string code = 3;
  string name = 4;
  string description = 5;
  string status = 6;
  int32 display_order = 7;
  string price_id = 8;
  double amount = 9;
  string currency = 10;
  string interval_unit = 11;
  int32 interval_count = 12;
  int32 active_subscriber_count = 13;
  string parent_plan_id = 14;
  string offer_id = 15;
  string checkout_plan_code = 16;
  string checkout_option_code = 17;
  bool is_offer = 18;
  string offer_phase_kind = 19;
  double offer_phase_amount = 20;
  string offer_phase_currency = 21;
  string offer_phase_duration_unit = 22;
  int32 offer_phase_duration_count = 23;
  double recurring_amount = 24;
  string recurring_currency = 25;
  string recurring_interval_unit = 26;
  int32 recurring_interval_count = 27;
  string display_name = 28;
  string display_description = 29;
  string badge_text = 30;
  int32 highlight_rank = 31;
  bool is_recommended = 32;
  string recommendation_reason = 33;
  string terms_summary = 34;
  string disclosure_text = 35;
}
message ListPlansResponse { repeated PlanResponse plans = 1; }
message ListOffersRequest { string plan_id = 1; bool enabled_only = 2; }
message OfferResponse {
  string id = 1;
  string plan_id = 2;
  string price_id = 3;
  string code = 4;
  string name = 5;
  string description = 6;
  bool is_enabled = 7;
  string created_at_utc = 8;
  string updated_at_utc = 9;
}
message ListOffersResponse { repeated OfferResponse offers = 1; }

message ListPoliciesRequest {}
message TrialPolicyResponse {
  string id = 1;
  string product_id = 2;
  string plan_id = 3;
  string price_id = 4;
  string offer_id = 5;
  string name = 6;
  int32 trial_days = 7;
  int32 max_redemptions_per_customer = 8;
  bool is_enabled = 9;
  string eligibility_rules_json = 10;
}
message BillingPolicyResponse {
  string id = 1;
  string product_id = 2;
  string plan_id = 3;
  string price_id = 4;
  int32 retry_count = 5;
  int32 retry_interval_hours = 6;
  int32 grace_days = 7;
  string failure_access_behavior = 8;
  bool is_enabled = 9;
}
message ListTrialPoliciesResponse { repeated TrialPolicyResponse policies = 1; }
message ListBillingPoliciesResponse { repeated BillingPolicyResponse policies = 1; }

message RequestContext {
  string correlation_id = 1;
  string request_id = 2;
  string actor_user_id = 3;
  string actor_type = 4;
  string ip_address = 5;
  string user_agent = 6;
  string reason = 7;
}

message EntityIdRequest {
  string id = 1;
  RequestContext context = 2;
}

message CustomerRequest {
  string customer_id = 1;
  RequestContext context = 2;
}

message ListSubscriptionsRequest {
  string customer_id = 1;
  string status = 2;
  int32 limit = 3;
}

message CreateProductRequest {
  string code = 1;
  string name = 2;
  string description = 3;
  RequestContext context = 4;
}

message CreatePlanRequest {
  string product_id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  RequestContext context = 5;
}

message CreatePriceRequest {
  string plan_id = 1;
  string code = 2;
  double amount = 3;
  string currency = 4;
  string interval_unit = 5;
  int32 interval_count = 6;
  bool is_default = 7;
  RequestContext context = 8;
}

message CreateOfferRequest {
  string plan_id = 1;
  string price_id = 2;
  string code = 3;
  string name = 4;
  string description = 5;
  RequestContext context = 6;
}

message ConfigureOfferPhaseRequest {
  string offer_id = 1;
  string kind = 2;
  int32 sequence = 3;
  double amount = 4;
  string currency = 5;
  string duration_unit = 6;
  int32 duration_count = 7;
  bool is_enabled = 8;
  RequestContext context = 9;
}

message ConfigureCatalogPresentationRequest {
  string plan_id = 1;
  string offer_id = 2;
  string display_name = 3;
  string display_description = 4;
  string badge_text = 5;
  int32 highlight_rank = 6;
  bool is_recommended = 7;
  string recommendation_reason = 8;
  string terms_summary = 9;
  string disclosure_text = 10;
  bool is_enabled = 11;
  RequestContext context = 12;
}

message AttachEntitlementToPlanRequest {
  string plan_id = 1;
  string feature_code = 2;
  string value = 3;
  double usage_limit = 4;
  RequestContext context = 5;
}

message ConfigureTrialPolicyRequest {
  string product_id = 1;
  string plan_id = 2;
  string price_id = 3;
  string offer_id = 4;
  string name = 5;
  int32 trial_days = 6;
  int32 max_redemptions_per_customer = 7;
  bool is_enabled = 8;
  string eligibility_rules_json = 9;
  RequestContext context = 10;
}

message ConfigureBillingPolicyRequest {
  string product_id = 1;
  string plan_id = 2;
  string price_id = 3;
  int32 retry_count = 4;
  int32 retry_interval_hours = 5;
  int32 grace_days = 6;
  string failure_access_behavior = 7;
  bool is_enabled = 8;
  RequestContext context = 9;
}

message StartTrialRequest {
  string customer_id = 1;
  string product_id = 2;
  string plan_id = 3;
  string price_id = 4;
  string offer_id = 5;
  string payment_provider = 6;
  string external_reference = 7;
  RequestContext context = 8;
}

message StartSubscriptionRequest {
  string customer_id = 1;
  string product_id = 2;
  string plan_id = 3;
  string price_id = 4;
  string offer_id = 5;
  string payment_provider = 6;
  string external_reference = 7;
  bool charge_immediately = 8;
  RequestContext context = 9;
}

message ChangePlanRequest {
  string subscription_id = 1;
  string plan_id = 2;
  string price_id = 3;
  RequestContext context = 4;
}

message CheckEntitlementRequest {
  string subscription_id = 1;
  string feature_code = 2;
}

message RecordUsageRequest {
  string subscription_id = 1;
  string customer_id = 2;
  string feature_code = 3;
  double quantity = 4;
  string unit = 5;
  string idempotency_key = 6;
  RequestContext context = 7;
}

message CreateInvoiceRequest {
  string subscription_id = 1;
  string description = 2;
  RequestContext context = 3;
}

message RefundPaymentRequest {
  string payment_id = 1;
  string reason = 2;
  RequestContext context = 3;
}

message CreateCheckoutRequest {
  string customer_id = 1;
  string plan_code = 2;
  string billing_cycle = 3;
  string checkout_option_code = 4;
  string callback_url = 5;
  RequestContext context = 6;
}

message PaymentReferenceRequest {
  string reference = 1;
  RequestContext context = 2;
}

message ReceivePaystackWebhookRequest {
  string payload = 1;
  RequestContext context = 2;
}

message EntityResponse {
  string id = 1;
  string message = 2;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

message SubscriptionStatusResponse {
  string subscription_id = 1;
  string status = 2;
  string access_behavior = 3;
}

message SubscriptionResponse {
  string id = 1;
  string customer_id = 2;
  string product_id = 3;
  string plan_id = 4;
  string price_id = 5;
  string offer_id = 6;
  string status = 7;
  string access_behavior = 8;
  string payment_provider = 9;
  string current_period_start_utc = 10;
  string current_period_end_utc = 11;
  string trial_ends_at_utc = 12;
}

message ListSubscriptionsResponse { repeated SubscriptionResponse subscriptions = 1; }

message CheckEntitlementResponse {
  bool allowed = 1;
  string access_behavior = 2;
  string reason = 3;
  string value = 4;
}

message EntitlementSnapshotResponse {
  string subscription_id = 1;
  string customer_id = 2;
  string access_behavior = 3;
  string snapshot_json = 4;
  string calculated_at_utc = 5;
}

message InvoiceResponse {
  string id = 1;
  string subscription_id = 2;
  string customer_id = 3;
  string number = 4;
  string status = 5;
  double total_amount = 6;
  double amount_due = 7;
  string currency = 8;
  string due_at_utc = 9;
  string paid_at_utc = 10;
}

message ListInvoicesResponse {
  repeated InvoiceResponse invoices = 1;
}

message ListBillingDocumentsRequest {
  string customer_id = 1;
  string status = 2;
  int32 limit = 3;
  RequestContext context = 4;
}

message PaymentIntentResponse {
  string id = 1;
  string invoice_id = 2;
  string subscription_id = 3;
  string provider = 4;
  string status = 5;
  string provider_reference = 6;
  string checkout_url = 7;
}

message CheckoutResponse {
  SubscriptionResponse subscription = 1;
  PaymentIntentResponse payment_intent = 2;
  bool requires_payment = 3;
}

message PaymentResponse {
  string id = 1;
  string invoice_id = 2;
  string subscription_id = 3;
  string provider = 4;
  string status = 5;
  double amount = 6;
  string currency = 7;
  string provider_reference = 8;
  string processed_at_utc = 9;
  string failure_reason = 10;
}

message ListPaymentsResponse { repeated PaymentResponse payments = 1; }

message ListLedgerAccountsRequest {}
message LedgerAccountResponse {
  string id = 1;
  string code = 2;
  string name = 3;
  string category = 4;
  bool is_system = 5;
}
message ListLedgerAccountsResponse { repeated LedgerAccountResponse accounts = 1; }

message ListLedgerTransactionsRequest {
  string reference = 1;
  int32 limit = 2;
}
message LedgerEntryResponse {
  string id = 1;
  string ledger_account_id = 2;
  string direction = 3;
  double amount = 4;
  string currency = 5;
  string memo = 6;
}
message LedgerTransactionResponse {
  string id = 1;
  string reference = 2;
  string description = 3;
  string posted_at_utc = 4;
  repeated LedgerEntryResponse entries = 5;
}
message ListLedgerTransactionsResponse { repeated LedgerTransactionResponse transactions = 1; }
